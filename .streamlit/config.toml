[theme]
base = "dark"
primaryColor = "#667eea"
backgroundColor = "#0a0e27"
secondaryBackgroundColor = "#1a1f3a"
textColor = "#e0e7ff"
font = "sans serif"

[server]
headless = true
port = $PORT
enableCORS = false
enableXsrfProtection = false
maxUploadSize = 200

[browser]
gatherUsageStats = false

[logger]
level = "info"
